    :root,[data-theme="light"]{
      --color-bg:#F7F7F7;--color-surface:#FFFFFF;--color-surface-2:#FAFAFA;--color-surface-offset:#F0F0F0;--color-divider:#E5E5E5;--color-border:#D6D6D6;

    [data-theme="dark"]{
      --color-bg:#0D0D0D;--color-surface:#141414;--color-surface-2:#1C1C1C;--color-surface-offset:#222222;--color-divider:#2F2F2F;--color-border:#3A3A3A;
      --color-text:#F5F5F5;--color-text-muted:#D1D1D1;--color-text-faint:#A3A3A3;--color-text-inverse:#111111;
      --color-primary:#FCA5A5;--color-primary-hover:#F87171;--color-primary-active:#EF4444;--color-primary-highlight:#3B1F1F;
      --color-success-bg:#14532d33;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 12px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);min-height:100vh;display:flex}
    a{text-decoration:none;color:inherit}
    button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);flex:none;height:100vh;position:sticky;top:0;background:var(--color-surface);border-right:1px solid var(--color-divider);display:flex;flex-direction:column;padding:1.5rem 1rem;overflow-y:auto}
    .sidebar-brand{display:flex;align-items:center;gap:.6rem;padding:.25rem .5rem;margin-bottom:2rem}
    .brand-mark{width:2.4rem;height:2.4rem;padding:.38rem;border-radius:.7rem;background:linear-gradient(135deg,var(--color-primary-highlight),transparent);border:1px solid color-mix(in srgb,var(--color-primary) 22%,transparent)}
    .brand-name{font-family:var(--font-display);font-size:1.2rem;font-weight:900;color:#D31510;line-height:1}
    .nav-section{margin-bottom:1.75rem}
    .nav-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-faint);padding:0 .5rem;margin-bottom:.5rem}
    .nav-item{display:flex;align-items:center;gap:.7rem;padding:.7rem .85rem;border-radius:.85rem;font-size:.92rem;font-weight:500;color:var(--color-text-muted);transition:.15s;margin-bottom:.15rem;cursor:pointer}
    .nav-item:hover{background:var(--color-surface-offset);color:var(--color-text)}
    .nav-item.active{background:var(--color-primary-highlight);color:var(--color-primary-active);font-weight:700}
    [data-theme="dark"] .nav-item.active{color:var(--color-primary)}
    .nav-item svg{flex:none;opacity:.7}
    .nav-item.active svg{opacity:1}
    .sidebar-bottom{margin-top:auto;padding-top:1rem;border-top:1px solid var(--color-divider)}
    .user-pill{display:flex;align-items:center;gap:.7rem;padding:.75rem .85rem;border-radius:.85rem;cursor:pointer;transition:.15s}
    .user-pill:hover{background:var(--color-surface-offset)}
    .avatar{width:2.2rem;height:2.2rem;border-radius:999px;background:linear-gradient(135deg,#D31510,#f97373);display:grid;place-items:center;font-weight:700;font-size:.85rem;color:#fff;flex:none}
    .user-info{flex:1;min-width:0}
    .user-name{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role{font-size:.75rem;color:var(--color-text-faint)}
    .nav-badge{margin-left:auto;min-width:1.3rem;height:1.3rem;border-radius:999px;background:var(--color-primary);color:#fff;font-size:.68rem;font-weight:800;display:grid;place-items:center;padding:0 .25rem}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;background:var(--color-surface);border-bottom:1px solid var(--color-divider);position:sticky;top:0;z-index:50}
    .topbar-left h1{font-family:var(--font-display);font-size:1.35rem;font-weight:800;letter-spacing:-.02em}
    .topbar-left p{font-size:.83rem;color:var(--color-text-faint);margin-top:.1rem}
    .topbar-right{display:flex;align-items:center;gap:.75rem}
    .icon-btn{width:2.5rem;height:2.5rem;border-radius:999px;border:1px solid var(--color-border);background:var(--color-surface);display:inline-flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:.15s}
    .icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
    .menu-btn{display:none;width:2.5rem;height:2.5rem;border-radius:999px;border:1px solid var(--color-border);background:var(--color-surface);align-items:center;justify-content:center}
    .content{padding:2rem;flex:1;max-width:780px}

    /* Filter bar */
    .filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
    .filter-tabs{display:flex;gap:.35rem;background:var(--color-surface);border:1px solid var(--color-divider);border-radius:.85rem;padding:.3rem}
    .filter-tab{padding:.45rem 1rem;border-radius:.6rem;font-size:.85rem;font-weight:600;color:var(--color-text-faint);transition:.15s;cursor:pointer;white-space:nowrap}
    .filter-tab:hover{color:var(--color-text)}
    .filter-tab.active{background:var(--color-surface-offset);color:var(--color-text)}
    .btn-mark-all{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:999px;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s}
    .btn-mark-all:hover{background:var(--color-surface-offset);color:var(--color-text)}

    /* Notification group */
    .notif-group{margin-bottom:1.75rem}
    .notif-group-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-faint);margin-bottom:.65rem;padding:0 .25rem}

    /* Notification item */
    .notif-card{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:1.15rem;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:1rem;margin-bottom:.6rem;transition:.2s;position:relative;cursor:pointer}
    .notif-card:hover{border-color:color-mix(in srgb,var(--color-primary) 30%,transparent);box-shadow:var(--shadow-md)}
    .notif-card.unread{background:color-mix(in srgb,var(--color-primary-highlight) 60%,var(--color-surface));border-color:color-mix(in srgb,var(--color-primary) 20%,transparent)}
    [data-theme="dark"] .notif-card.unread{background:color-mix(in srgb,var(--color-primary-highlight) 40%,var(--color-surface))}
    .unread-dot{position:absolute;top:1.1rem;right:1.25rem;width:.55rem;height:.55rem;border-radius:50%;background:var(--color-primary)}

    /* Icon */
    .notif-icon{width:2.6rem;height:2.6rem;border-radius:999px;display:grid;place-items:center;flex:none;font-size:1.1rem}
    .notif-icon.deposit{background:#dcfce7}
    .notif-icon.withdrawal{background:#fee2e2}
    .notif-icon.security{background:#dbeafe}
    .notif-icon.system{background:#fef9c3}
    .notif-icon.portfolio{background:var(--color-primary-highlight)}
    [data-theme="dark"] .notif-icon.deposit{background:#14532d33}
    [data-theme="dark"] .notif-icon.withdrawal{background:#3b1f1f}
    [data-theme="dark"] .notif-icon.security{background:#1e3a5f33}
    [data-theme="dark"] .notif-icon.system{background:#422006}

    .notif-body{flex:1;min-width:0}
    .notif-title{font-size:.92rem;font-weight:700;margin-bottom:.2rem;padding-right:1rem}
    .notif-desc{font-size:.83rem;color:var(--color-text-muted);line-height:1.55}
    .notif-time{font-size:.75rem;color:var(--color-text-faint);margin-top:.4rem;display:flex;align-items:center;gap:.35rem}

    /* Amount highlight */
    .notif-amount-pos{color:#437a22;font-weight:700}
    .notif-amount-neg{color:#D31510;font-weight:700}
    [data-theme="dark"] .notif-amount-pos{color:#4ade80}
    [data-theme="dark"] .notif-amount-neg{color:#fca5a5}

    /* Empty state */
    .empty-state{text-align:center;padding:4rem 2rem;background:var(--color-surface);border:1px solid var(--color-divider);border-radius:1.25rem}
    .empty-state svg{margin:0 auto 1rem;opacity:.2;display:block}
    .empty-state h3{font-family:var(--font-display);font-size:1.1rem;font-weight:800;margin-bottom:.4rem}
    .empty-state p{font-size:.88rem;color:var(--color-text-faint)}

    @media(max-width:900px){
      .sidebar{position:fixed;left:-100%;z-index:200;transition:.3s;height:100vh}
      .sidebar.open{left:0}
      .main{width:100%}
      .menu-btn{display:inline-flex}
      .content{padding:1.25rem}
      .topbar{padding:1rem 1.25rem}
    }
  </style>
</head>

  <script>
    /* ── Theme ── */
        // ── Theme Toggle ──
    let _theme = localStorage.getItem('dc-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', _theme);
      localStorage.setItem('dc-theme', _theme);
      var btn = document.getElementById('theme-btn');
      if (btn) {
        btn.innerHTML = _theme === 'dark'
          ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      }
    }
    function toggleTheme() { _theme = _theme === 'dark' ? 'light' : 'dark'; applyTheme(); }
    document.addEventListener('DOMContentLoaded', applyTheme);
    {
      root.setAttribute('data-theme', theme);
      localStorage.setItem('dc-theme', theme);
      document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
        btn.innerHTML = theme === 'dark'
          ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
          : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      });
    }
    applyTheme();
    document.addEventListener('click', e => {
      if (e.target.closest('[data-theme-toggle]')) { theme = theme === 'dark' ? 'light' : 'dark'; applyTheme(); }
    });

    /* ── Data ── */
    let notifications = [

      { id: 7, type: 'withdrawal', title: 'Withdrawal Rejected', desc: 'Your withdrawal request of <span class="notif-amount-neg">−$4,000.00</span> via Debit Card was rejected. Please contact support for more information.', time: '2024-10-06T09:10:00Z', unread: false },

      { id: 11, type: 'deposit', title: 'Deposit Confirmed', desc: 'Your deposit of <span class="notif-amount-pos">+$60,000.00</span> via Bank Transfer has been confirmed and credited to your account.', time: '2024-07-17T14:00:00Z', unread: false },
      { id: 12, type: 'portfolio', title: 'Monthly Performance Report', desc: 'Your portfolio grew by <span class="notif-amount-pos">+8.4%</span> in June 2024. View your full performance report in the Portfolio section.', time: '2024-07-01T09:00:00Z', unread: false },
      { id: 13, type: 'withdrawal', title: 'Withdrawal Completed', desc: 'Your withdrawal of <span class="notif-amount-neg">−$9,500.00</span> via Bank Transfer has been completed and sent to your account.', time: '2024-06-22T16:40:00Z', unread: false },

    ];

    let currentFilter = 'all';

    /* ── Auth ── */
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'login.html'; return; }
      const meta = session.user.user_metadata;
      const first = meta.first_name || '';
      const last = meta.last_name || '';
      const initials = ((first || session.user.email[0] || '?')[0] + (last || session.user.email[1] || '?')[0]).toUpperCase();
      document.getElementById('user-avatar').textContent = initials;
      document.getElementById('user-name').textContent = (first + ' ' + last).trim() || session.user.email;
      render();
    });

    /* ── Icons ── */
    const icons = {
      deposit:    '💰',
      withdrawal: '💸',
      security:   '🔐',

      portfolio:  '📈',
    };

    /* ── Render ── */
    function render() {
      const list = document.getElementById('notif-list');
      const unreadCount = notifications.filter(n => n.unread).length;

      // Update badge & subtitle
      const badge = document.getElementById('unread-badge');
      badge.textContent = unreadCount;
      badge.style.display = unreadCount > 0 ? 'grid' : 'none';
      document.getElementById('unread-count-text').textContent =
        unreadCount > 0 ? `${unreadCount} unread notification${unreadCount > 1 ? 's' : ''}` : 'All caught up!';

      // Filter
      let filtered = notifications;
      if (currentFilter === 'unread') filtered = notifications.filter(n => n.unread);
      else if (currentFilter !== 'all') filtered = notifications.filter(n => n.type === currentFilter);

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <h3>No notifications</h3>
          <p>Nothing to show for this filter.</p>
        </div>`;
        return;
      }

      // Group by date
      const groups = {};
      filtered.forEach(n => {
        const label = groupLabel(n.time);
        if (!groups[label]) groups[label] = [];
        groups[label].push(n);
      });

      list.innerHTML = Object.entries(groups).map(([label, items]) => `
        <div class="notif-group">
          <div class="notif-group-label">${label}</div>
          ${items.map(n => `
            <div class="notif-card ${n.unread ? 'unread' : ''}" onclick="markRead(${n.id})">
              <div class="notif-icon ${n.type}">${icons[n.type] || '🔔'}</div>
              <div class="notif-body">
                <div class="notif-title">${n.title}</div>
                <div class="notif-desc">${n.desc}</div>
                <div class="notif-time">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                  ${fmtTime(n.time)}
                </div>
              </div>
              ${n.unread ? '<div class="unread-dot"></div>' : ''}
            </div>`).join('')}
        </div>`).join('');
    }

    /* ── Actions ── */
    function markRead(id) {
      const n = notifications.find(x => x.id === id);
      if (n) n.unread = false;
      render();
    }

    function markAllRead() {
      notifications.forEach(n => n.unread = false);
      render();
    }

    function setFilter(filter, el) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    /* ── Helpers ── */
    function groupLabel(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 864e5);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return 'This Week';
      if (diff < 30) return 'This Month';
      if (d.getFullYear() === now.getFullYear()) return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function fmtTime(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 60000);
      if (diff < 1) return 'Just now';
      if (diff < 60) return `${diff}m ago`;
      if (diff < 1440) return `${Math.floor(diff / 60)}h ago`;
      if (diff < 10080) return `${Math.floor(diff / 1440)}d ago`;
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    /* ── Misc ── */
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    document.addEventListener('click', e => {
      const sb = document.getElementById('sidebar');
      if (sb.classList.contains('open') && !sb.contains(e.target) && !e.target.closest('.menu-btn')) sb.classList.remove('open');
    });

    async function handleLogout(){
      try {
        await supabaseClient.auth.signOut();
      } catch(e) {}
      localStorage.removeItem('dc-theme');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
