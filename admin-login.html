<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Deriv Capital</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    async function handleLogout(){
      try {
        await supabaseClient.auth.signOut();
      } catch(e) {}
      localStorage.removeItem('dc-theme');
      window.location.href = 'login.html';
    }
  </script>
  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://wnnwrcgrwxdnrlzabdty.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndubndyY2dyd3hkbnJsemFiZHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzUxMTYsImV4cCI6MjA5MDIxMTExNn0.Nh-bL2KQPGznSeHxPpsz371vlXFXpTBLhPwRCABWhbQ'
    );
  </script>
  <style>
    :root {
      --color-bg:#0D0D0D;--color-surface:#141414;--color-surface-2:#1C1C1C;
      --color-surface-offset:#222222;--color-divider:#2F2F2F;--color-border:#3A3A3A;
      --color-text:#F5F5F5;--color-text-muted:#D1D1D1;--color-text-faint:#A3A3A3;
      --color-primary:#F97373;--color-primary-hover:#EF4444;--color-primary-active:#DC2626;
      --color-primary-highlight:#3B1F1F;
      --color-admin:#F59E0B;--color-admin-hover:#D97706;--color-admin-highlight:rgba(245,158,11,.12);
      --shadow-md:0 12px 30px rgba(0,0,0,.35);--shadow-lg:0 24px 60px rgba(0,0,0,.45);
      --font-body:'Satoshi',Inter,sans-serif;--font-display:'Cabinet Grotesk','Satoshi',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

    /* Background FX */
    .bg-glow{position:fixed;pointer-events:none;border-radius:50%}
    .bg-glow-1{top:-20%;right:-10%;width:45rem;height:45rem;background:radial-gradient(circle,rgba(245,158,11,.07),transparent 65%)}
    .bg-glow-2{bottom:-25%;left:-15%;width:40rem;height:40rem;background:radial-gradient(circle,rgba(220,38,38,.06),transparent 65%)}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

    /* Card */
    .login-wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:1.5rem}
    .login-card{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:1.75rem;padding:2.75rem 2.5rem;box-shadow:var(--shadow-lg)}

    /* Brand */
    .brand{display:flex;align-items:center;gap:.65rem;margin-bottom:2.25rem;justify-content:center}
    .brand-mark{width:2.55rem;height:2.55rem;padding:.42rem;border-radius:.8rem;background:linear-gradient(135deg,var(--color-primary-highlight),transparent);border:1px solid rgba(249,115,115,.22)}
    .brand-name{font-family:var(--font-display);font-size:1.35rem;font-weight:900;color:#D31510;line-height:1}

    /* Admin badge */
    .admin-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:999px;background:var(--color-admin-highlight);border:1px solid rgba(245,158,11,.25);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--color-admin);margin-bottom:1.5rem}
    .admin-badge-dot{width:.45rem;height:.45rem;border-radius:50%;background:var(--color-admin);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

    .login-heading{font-family:var(--font-display);font-size:1.75rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:.5rem}
    .login-sub{color:var(--color-text-faint);font-size:.9rem;line-height:1.6;margin-bottom:2rem}

    /* Form */
    .field{margin-bottom:1.1rem}
    .field label{display:block;font-size:.82rem;font-weight:700;color:var(--color-text-muted);margin-bottom:.5rem;letter-spacing:.02em}
    .field input{width:100%;padding:.8rem 1.1rem;border-radius:.85rem;border:1px solid var(--color-border);background:var(--color-surface-offset);color:var(--color-text);font:inherit;font-size:.95rem;transition:.2s;outline:none}
    .field input:focus{border-color:var(--color-admin);background:var(--color-surface-2);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
    .field input::placeholder{color:var(--color-text-faint)}

    .btn-admin{width:100%;padding:.9rem 1.5rem;border-radius:999px;font:inherit;font-size:.95rem;font-weight:700;background:var(--color-admin);color:#0D0D0D;border:none;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.5rem}
    .btn-admin:hover{background:var(--color-admin-hover);transform:translateY(-1px);box-shadow:0 10px 30px rgba(245,158,11,.25)}
    .btn-admin:active{transform:translateY(0)}
    .btn-admin:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .error-msg{display:none;padding:.75rem 1rem;border-radius:.75rem;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.25);color:#fca5a5;font-size:.85rem;margin-top:1rem;text-align:center}
    .error-msg.show{display:block}

    .back-link{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1.5rem;font-size:.83rem;color:var(--color-text-faint);transition:.2s}
    .back-link:hover{color:var(--color-text-muted)}
    .back-link svg{opacity:.6}

    /* Security notice */
    .security-notice{display:flex;align-items:flex-start;gap:.65rem;padding:.85rem 1rem;border-radius:.85rem;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);margin-top:1.5rem}
    .security-notice svg{flex:none;color:var(--color-admin);margin-top:.1rem}
    .security-notice p{font-size:.78rem;color:var(--color-text-faint);line-height:1.55}

    /* Spinner */
    .spinner{width:1rem;height:1rem;border:2px solid rgba(13,13,13,.3);border-top-color:#0D0D0D;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-grid"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 48V16h11.5c13.5 0 20.5 5.4 20.5 16s-7 16-20.5 16H16Z" stroke="currentColor" stroke-width="4"/><path d="M25 24h6.5c6.4 0 10.5 2.6 10.5 8s-4.1 8-10.5 8H25V24Z" fill="currentColor"/></svg>
        </span>
        <span class="brand-name">Deriv Capital</span>
      </div>

      <div class="admin-badge">
        <span class="admin-badge-dot"></span>
        Admin Portal
      </div>

      <h1 class="login-heading">Restricted Access</h1>
      <p class="login-sub">This area is for authorised administrators only. All activity is logged and monitored.</p>

      <div class="field">
        <label for="admin-email">Admin Email</label>
        <input type="email" id="admin-email" placeholder="admin@derivcapital.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" placeholder="••••••••••••" autocomplete="current-password" />
      </div>

      <div class="error-msg" id="error-msg">Invalid credentials or insufficient permissions.</div>

      <button class="btn-admin" id="login-btn" onclick="handleAdminLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Sign In to Admin
      </button>

      <div class="security-notice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <p>Unauthorised access attempts are recorded. This system is protected under applicable law.</p>
      </div>

      <a href="index.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to main site
      </a>
    </div>
  </div>

  <script>
    const ADMIN_EMAILS = ['azanorjoackim1@gmail.com'];

    function isAdminEmail(email) {
      return ADMIN_EMAILS.includes((email || '').toLowerCase().trim());
    }

    // If already logged in with the right email, go straight in
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session && isAdminEmail(session.user?.email)) {
        window.location.href = 'admin.html';
      }
    });

    async function handleAdminLogin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const btn = document.getElementById('login-btn');
      const errMsg = document.getElementById('error-msg');

      errMsg.classList.remove('show');

      if (!email || !password) {
        errMsg.textContent = 'Please enter your email and password.';
        errMsg.classList.add('show');
        return;
      }

      // Check email is on whitelist before even trying
      if (!isAdminEmail(email)) {
        errMsg.textContent = 'This email is not authorised for admin access.';
        errMsg.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Authenticating…';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          // If email not confirmed, try to confirm and retry
          if (error.message.includes('Email not confirmed')) {
            errMsg.textContent = 'Please confirm your email first. Check your inbox for a confirmation link.';
          } else if (error.message.includes('Invalid login credentials')) {
            errMsg.textContent = 'Wrong password. Please check and try again.';
          } else {
            errMsg.textContent = 'Error: ' + error.message;
          }
          errMsg.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Sign In to Admin`;
          return;
        }

        // Success — go to admin panel
        window.location.href = 'admin.html';

      } catch (err) {
        errMsg.textContent = 'Unexpected error: ' + err.message;
        errMsg.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Sign In to Admin`;
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAdminLogin(); });
  </script>
</body>
</html>
